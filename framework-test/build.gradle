sourceSets {
    taglet
    tagletJdk8
}

dependencies {
    implementation "junit:junit:${versions.junit}"
    implementation project(':javacutil')
    implementation project(':checker-qual')

    implementation "org.plumelib:plume-util:${versions.plumeUtil}"

    if (isJava8) {
        // Use compilerFor (not launcherFor): javac lives only in the JDK root, so
        // installationPath is guaranteed to be the JDK home where lib/tools.jar exists.
        def compilerProvider = javaToolchains.compilerFor {
            languageVersion = JavaLanguageVersion.of(8)
        }
        def toolsJar = compilerProvider.map { compiler ->
            new File(compiler.metadata.installationPath.asFile, "lib/tools.jar")
        }

        tagletJdk8Implementation files(toolsJar)
    }

    testImplementation project(':framework')
}

// Shadow 9.4.2 eagerly triggers compile tasks for all source sets.
// Only enable Java 8 specific compilation when actually on Java 8.
tasks.named('compileTagletJdk8Java') {
    enabled = isJava8
}
tasks.named('compileTagletJava') {
    enabled = !isJava8
}

tasks.named('jar') {
    archiveBaseName = 'framework-test'
}

apply from: rootProject.file('gradle-mvn-push.gradle')

/** Adds information to the publication for uploading to Maven repositories. */
final frameworkTest(publication) {
    rootProject.sharedPublicationConfiguration(publication)
    publication.from components.java
    publication.pom {
        name = 'Checker Framework Testing Library'
        description = String.join(System.lineSeparator(),
                'framework-test contains utility classes for testing type-checkers',
                'that are built on the Checker Framework.')
        licenses {
            license {
                name = 'GNU General Public License, version 2 (GPL2), with the classpath exception'
                url = 'http://www.gnu.org/software/classpath/license.html'
                distribution = 'repo'
            }
        }
    }
}

publishing {
    publications {
        frameworkTest(MavenPublication) {
            frameworkTest it
        }
    }
}

signing {
    sign publishing.publications.frameworkTest
}
