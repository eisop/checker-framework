jar {
    manifest {
        attributes('Main-Class': 'org.checkerframework.framework.util.CheckerMain')
    }
}

/**
 * Apply the testLogging configuration shared by every Ainfer JUnit task in this
 * file.  Pass the task as 'delegate' from inside a 'task X(type: Test) { ... }'
 * closure, e.g. 'configureAinferTestLogging(delegate)'.
 */
void configureAinferTestLogging(Test t) {
    t.testLogging {
        // Show the found unexpected diagnostics and expected diagnostics not found.
        exceptionFormat = 'full'
        events 'passed', 'skipped', 'failed'
    }
}

// This task differs from the `assemble` task in that it does not build Javadoc.
// It is useful for those who only want to run `javac`.
tasks.register('assembleForJavac') {
    group = 'Build'
    description = 'Builds or downloads jars required by CheckerMain and puts them in checker/dist/.'
    dependsOn 'shadowJar'
    dependsOn ':checker-qual:jar'
    dependsOn ':checker-util:jar'

    def checkerQualJar = project(':checker-qual').tasks.named('jar', Jar).flatMap { it.archiveFile }
    def checkerUtilJar = project(':checker-util').tasks.named('jar', Jar).flatMap { it.archiveFile }
    def shadowJarArchive =
            tasks.named('shadowJar', com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar)
            .flatMap { it.archiveFile }
    def javacJarConf = configurations.javacJar
    def distDir = layout.projectDirectory.dir('dist')
    def injectedFiles = project.objects.newInstance(InjectedFileOps)

    inputs.files(checkerQualJar, checkerUtilJar, shadowJarArchive, javacJarConf).withPropertyName('sourceJars')
    outputs.file(distDir.file('checker-qual.jar'))
    outputs.file(distDir.file('checker-util.jar'))
    outputs.file(distDir.file('checker.jar'))
    outputs.file(distDir.file('javac.jar'))

    doLast {
        def checkerQualJarFile = checkerQualJar.get().asFile
        if (!checkerQualJarFile.exists()) {
            throw new GradleException('File not found: ' + checkerQualJarFile)
        }
        injectedFiles.fs.copy {
            from checkerQualJarFile
            into distDir
            // remove version number
            rename { 'checker-qual.jar' }
        }

        def checkerUtilJarFile = checkerUtilJar.get().asFile
        if (!checkerUtilJarFile.exists()) {
            throw new GradleException('File not found: ' + checkerUtilJarFile)
        }
        injectedFiles.fs.copy {
            from checkerUtilJarFile
            into distDir
            // remove version number
            rename { 'checker-util.jar' }
        }

        injectedFiles.fs.copy {
            // This is required to *run* the Checker Framework on JDK 8.
            from javacJarConf
            into distDir
            rename { 'javac.jar' }
        }

        injectedFiles.fs.copy {
            from shadowJarArchive.get()
            into distDir
            rename { 'checker.jar' }
        }
    }
}

assemble.dependsOn 'assembleForJavac'

tasks.register('allSourcesJar', Jar) {
    group = 'Build'
    description = 'Creates a sources jar that includes sources for all Checker Framework classes in checker.jar'
    destinationDirectory = file("${projectDir}/dist")
    archiveFileName = 'checker-source.jar'
    archiveClassifier = 'sources'
    from (sourceSets.main.java, project(':framework').sourceSets.main.allJava,
            project(':dataflow').sourceSets.main.allJava, project(':javacutil').sourceSets.main.allJava,
            project(':checker-qual').sourceSets.main.allJava, project(':checker-util').sourceSets.main.allJava)
}

tasks.register('allJavadocJar', Jar) {
    group = 'Build'
    description = 'Creates javadoc jar including Javadoc for all of the Checker Framework'
    def allJavadoc = rootProject.tasks.named('allJavadoc', Javadoc)
    dependsOn allJavadoc
    // TODO: This should not be required, but without it the addFavicon task is sometimes not run
    // before this one.
    dependsOn rootProject.tasks.named('addFavicon')

    destinationDirectory = file("${projectDir}/dist")
    archiveFileName = 'checker-javadoc.jar'
    archiveClassifier = 'javadoc'
    from allJavadoc.map { it.destinationDir }
}

// Shadowing Test Sources and Dependencies
import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar

tasks.register('checkerJar', ShadowJar) {
    dependsOn 'compileJava'
    group = 'Build'
    description = "Builds checker-${project.version}.jar with all dependencies except checker-qual and checker-util."
    includeEmptyDirs = false
    base {
        archivesName = 'checker'
    }

    from shadowJar.source
    configurations = shadowJar.configurations
    // To see what files are incorporated into the shadow jar file:
    // doLast { println sourceSets.main.runtimeClasspath.asPath }
    manifest {
        attributes('Main-Class': 'org.checkerframework.framework.util.CheckerMain')
    }
    exclude 'org/checkerframework/**/qual/*'
    exclude 'org/checkerframework/checker/**/util/*'
    relocators = shadowJar.getRelocators()
}

jar {
    dependsOn('checkerJar')
    // Never build the skinny jar.
    onlyIf {false}
    archiveClassifier = 'skinny'
}

shadowJar {
    description = 'Creates checker-VERSION-all.jar and copies it to dist/checker.jar.'
    // To see what files are incorporated into the shadow jar file:
    // doFirst { println sourceSets.main.runtimeClasspath.asPath }
    archiveClassifier = 'all'
    def injectedFiles = project.objects.newInstance(InjectedFileOps)
    def shadowArchive = archiveFile
    def distDir = file("${projectDir}/dist")
    doLast {
        injectedFiles.fs.copy {
            from shadowArchive
            into distDir
            rename 'checker.*', 'checker.jar'
        }
    }

    minimize {
        // Keep all classes from checker-qual and checker-util rather than
        // relying on the `api` re-export to protect them from minimize().
        exclude(dependency('org.checkerframework:checker-qual:.*'))
        exclude(dependency('org.checkerframework:checker-util:.*'))
    }
}

// Build the shadow jar and the checker jar as part of `assemble`, without routing
// them through the legacy `archives` configuration (whose automatic wiring to
// `assemble` is going away in Gradle 9+).  Nothing consumes the `archives`
// configuration, so an explicit dependsOn is equivalent and more robust.
// Don't add allJavadocJar/allSourcesJar here, or the Javadoc and sources jars
// would be built during the assemble task.
tasks.named('assemble') {
    dependsOn('shadowJar')
    dependsOn('checkerJar')
}

artifacts {
    fatJar(tasks.named('shadowJar'))
}

clean {
    def injected = project.objects.newInstance(InjectedExecOps)
    def commandLineDir = file('tests/command-line')
    def nullnessExtraDir = file('tests/nullness-extra')

    delete("${projectDir}/dist")
    delete('tests/calledmethods-delomboked')
    delete('tests/ainfer-testchecker/annotated')
    delete('tests/ainfer-testchecker/inference-output')
    delete('tests/ainfer-nullness/annotated')
    delete('tests/ainfer-nullness/inference-output')
    delete('tests/ainfer-index/annotated')
    delete('tests/ainfer-index/inference-output')
    delete('tests/ainfer-resourceleak/annotated')
    delete('tests/ainfer-resourceleak/inference-output')
    delete('tests/build')
    doLast {
        injected.execOps.exec {
            workingDir = commandLineDir
            commandLine 'make', 'clean'
        }
        injected.execOps.exec {
            workingDir = nullnessExtraDir
            commandLine 'make', 'clean'
        }
    }
}

// Capture the build directory provider at configuration time.
def cleanBuildDir = layout.buildDirectory
clean.doLast {
    def buildDirFile = cleanBuildDir.get().asFile
    int maxAttempts = 6
    int attempt = 0
    while (buildDirFile.exists() && attempt < maxAttempts) {
        attempt++
        if (attempt > 1) {
            sleep(10000)                // wait 10 seconds
        }
        buildDirFile.deleteDir()
    }
    if (buildDirFile.exists()) {
        logger.error("Could not delete ${buildDirFile} after ${maxAttempts} attempt(s). Remaining contents:")
        buildDirFile.listFiles()?.each { logger.error("  ${it}") }
        throw new GradleException("Failed to delete build directory: ${buildDirFile}")
    }
}


