annotation.not.completed=Element %s contains annotation %s which can't be found. Make sure your classpath is set correctly.
unneeded.suppression=warning suppression %s is not used by %s
lsp.type.information=checker=%s; kind=%s; type=%s; range=%s
ambiguous.ajava=Found 2 or more candidate ajava files for this class. Disambiguate them by supplying directories instead of specific .ajava files. Ambiguous files: %s.
text.parsing.jdk=Text-parsing the annotated JDK because %s. This is much slower than reading its binary stub file, and the binary stub file of a different annotated JDK is never used in its place. To generate it, or to replace a damaged one, run org.checkerframework.framework.stubifier.JavaStubifier on the "annotated-jdk" directory that your build packages into the jar: JavaStubifier writes %s into the directory it is given, and that is where the Checker Framework looks for it.
text.parsing.jdk.class=Text-parsing the annotated JDK class %s: the loaded %s has no record for it, though the JDK sources beside it do. The binary stub file is stale or was generated from different sources; regenerate it.
text.parsing.stub=Text-parsing the stub file %s, which a checker distributes but which has no binary stub file. This is slower than reading one. Pre-parse it at build time with org.checkerframework.framework.stubifier.BinaryStubFileGenerator.
