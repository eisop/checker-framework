name: 'Set up misc test dependencies'
description: >-
  Installs the apt and pip dependencies required by the `misc` test script.

runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-missing \
          asciidoctor \
          autoconf \
          devscripts \
          dia \
          hevea \
          latexmk \
          libasound2-dev \
          libcups2-dev \
          libfontconfig1-dev \
          librsvg2-bin \
          libx11-dev \
          libxext-dev \
          libxrandr-dev \
          libxrender-dev \
          libxt-dev \
          libxtst-dev \
          pdf2svg \
          python3-pip \
          rsync \
          shellcheck \
          shfmt \
          texlive-font-utils \
          texlive-fonts-recommended \
          texlive-base \
          texlive-latex-base \
          texlive-latex-extra \
          texlive-latex-recommended

    - name: Install Python tools
      shell: bash
      # PEP 668: Ubuntu 24.04's system Python is externally-managed.
      # `--break-system-packages` is the documented escape hatch for CI.
      run: pip install --break-system-packages black flake8 html5validator
